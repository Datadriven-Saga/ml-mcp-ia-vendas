<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ofertas Saga</title>
  <!--
    Sem <meta http-equiv="Content-Security-Policy"> aqui.
    Quando servido via ui://, o ChatGPT Apps aplica a CSP do openai/widgetCSP
    do resource _meta. Um meta CSP com 'self' bloquearia CSS/JS externos.
  -->
  <link rel="stylesheet" href="STATIC_BASE/vehicle-offers.css">
</head>
<body>

  <!--
    SVG Sprite — ícones definidos uma vez no HTML, referenciados via <use> pelo JS.
    Inline SVG é conteúdo, não script ou estilo — não viola CSP.
  -->
  <svg id="icon-defs" aria-hidden="true" focusable="false" style="display:none">
    <defs>

      <symbol id="ic-door" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 20V6a2 2 0 00-2-2H8a2 2 0 00-2 2v14"/>
        <path d="M2 20h20"/>
        <circle cx="14" cy="12" r="1" fill="currentColor" stroke="none"/>
      </symbol>

      <symbol id="ic-ac" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v6m0 8v6
                 M4.93 4.93l4.24 4.24m5.66 5.66l4.24 4.24
                 M2 12h6m8 0h6
                 M4.93 19.07l4.24-4.24m5.66-5.66l4.24-4.24"/>
      </symbol>

      <symbol id="ic-window" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 12h18M12 3v18"/>
      </symbol>

      <symbol id="ic-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </symbol>

      <symbol id="ic-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </symbol>

      <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </symbol>

      <symbol id="ic-external" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </symbol>

    </defs>
  </svg>

  <!-- Raiz da aplicação -->
  <div id="app">

    <!-- Estado: Carregando -->
    <div id="s-load" role="status" aria-live="polite" aria-label="Carregando ofertas">
      <div class="spinner" aria-hidden="true"></div>
      <span class="load-text">Carregando ofertas…</span>
    </div>

    <!-- Estado: Erro -->
    <div id="s-err" hidden role="alert" aria-atomic="true">
      <span class="state-emoji" aria-hidden="true">⚠️</span>
      <p class="state-title">Não foi possível carregar</p>
      <p class="state-desc" id="err-msg">Tente novamente em instantes.</p>
      <button class="btn-retry" id="btn-retry" type="button">Tentar novamente</button>
    </div>

    <!-- Estado: Venda -->
    <div id="s-sell" hidden>
      <header id="sell-header" role="banner">
        <div class="hdr-period" id="sell-period"></div>
        <div class="hdr-agency" id="sell-agency"></div>
      </header>
      <div id="sell-body"></div>
    </div>

    <!-- Estado: Vazio -->
    <div id="s-empty" hidden aria-live="polite">
      <span class="state-emoji" aria-hidden="true">🔍</span>
      <p class="state-title">Nenhuma oferta encontrada</p>
      <p class="state-desc">Não há veículos disponíveis para estes critérios no momento.</p>
    </div>

    <!-- Estado: Principal -->
    <div id="s-main" hidden>
      <header id="widget-header" role="banner">
        <div class="hdr-period" id="hdr-period"></div>
        <div class="hdr-agency" id="hdr-agency"></div>
      </header>
      <div id="count-bar" aria-live="polite" aria-atomic="true"></div>
      <div class="carousel-outer" role="region" aria-label="Carrossel de ofertas">
        <button class="nav-btn nav-prev" id="btn-prev" type="button"
                aria-label="Oferta anterior" disabled>
          <span aria-hidden="true">‹</span>
        </button>
        <div class="carousel-track" id="track"
             role="list" aria-label="Lista de ofertas de veículos"></div>
        <button class="nav-btn nav-next" id="btn-next" type="button"
                aria-label="Próxima oferta">
          <span aria-hidden="true">›</span>
        </button>
      </div>
      <div id="dots-bar" aria-hidden="true" role="presentation"></div>
    </div>

  </div><!-- /#app -->

  <!-- Painel de debug — visível apenas com ?debug=1 -->
  <div id="dbg" hidden aria-label="Painel de debug">
    <div id="dbg-hdr">
      <span>🔧 DEBUG</span>
      <span>
        <button id="dbg-clear" type="button">limpar</button>
        <button id="dbg-close" type="button">✕</button>
      </span>
    </div>
    <div id="dbg-body"></div>
  </div>

  <!-- JS externo com defer — sem inline, sem unsafe-inline -->
  <script src="STATIC_BASE/vehicle-offers.js" defer></script>
</body>
</html>
